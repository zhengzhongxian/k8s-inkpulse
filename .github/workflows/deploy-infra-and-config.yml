name: Deploy K8s Infrastructure & Configs

on:
  push:
    branches: [ main, master ]

jobs:
  deploy-infra:
    name: ⚡ Deploy K8s Infrastructure Manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud SDK & GKE auth plugin
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'gke-gcloud-auth-plugin'

      - name: Get GKE Credentials
        run: |
          gcloud container clusters get-credentials inkpulse-cluster \
            --zone asia-southeast1-a \
            --project renticar-478014

      - name: Smart ConfigMaps & Infrastructure Apply
        env:
          ENTERPRISE_SECRETS_YAML: ${{ secrets.ENTERPRISE_SECRETS_YAML }}
          CONFIG_APPLICATION_YML: ${{ secrets.CONFIG_APPLICATION_YML }}
          CONFIG_AI_YAML: ${{ secrets.CONFIG_AI_YAML }}
          CONFIG_APPSETTINGS_JSON: ${{ secrets.CONFIG_APPSETTINGS_JSON }}
        run: |
          # Smart normalization helper function (ignores CRLF/LF & trailing whitespace)
          normalize_hash() {
            echo "$1" | tr -d '\r' | sed -e 's/[[:space:]]*$//' -e '/^$/d' | sha256sum | awk '{print $1}'
          }

          # 1. Apply Enterprise Secrets if defined
          if [ -n "$ENTERPRISE_SECRETS_YAML" ]; then
            echo "$ENTERPRISE_SECRETS_YAML" | kubectl apply -f -
          fi

          # 2. Smart ConfigMap Updates (only restart if meaningful changes detected)
          update_configmap_if_changed() {
            local cm_name="$1"
            local key_name="$2"
            local new_content="$3"
            local deploy_name="$4"

            if [ -z "$new_content" ]; then return 0; fi

            local old_content=$(kubectl get configmap "$cm_name" -o jsonpath="{.data.${key_name}}" 2>/dev/null || echo "")
            local old_hash=$(normalize_hash "$old_content")
            local new_hash=$(normalize_hash "$new_content")

            if [ "$old_hash" != "$new_hash" ]; then
              echo "⚡ ConfigMap $cm_name changed! Updating & restarting $deploy_name..."
              echo "$new_content" | kubectl create configmap "$cm_name" --from-file="${key_name}=/dev/stdin" -o yaml | kubectl apply -f -
              kubectl rollout restart "deployment/$deploy_name" || true
            else
              echo "✅ [SKIP] ConfigMap $cm_name has no meaningful changes (CRLF/whitespace ignored)."
            fi
          }

          update_configmap_if_changed "inkpulse-config" "application.yml" "$CONFIG_APPLICATION_YML" "backend-deployment"
          update_configmap_if_changed "ai-config" "config.yaml" "$CONFIG_AI_YAML" "ai-deployment"
          update_configmap_if_changed "inkpulse-worker-config" "appsettings.json" "$CONFIG_APPSETTINGS_JSON" "worker-deployment"

          # 3. Auto-install NGINX Ingress Controller if not present on GKE
          if ! kubectl get ns ingress-nginx >/dev/null 2>&1; then
            echo "⚡ Installing NGINX Ingress Controller on GKE..."
            kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/cloud/deploy.yaml
            echo "⏳ Waiting for NGINX Ingress Controller to be ready..."
            kubectl wait --namespace ingress-nginx \
              --for=condition=ready pod \
              --selector=app.kubernetes.io/component=controller \
              --timeout=120s || true
          fi

          # 4. Apply Secrets, RabbitMQ Operator, Infrastructure, Apps, Ingress, and Logging
          if [ -d "secrets" ]; then kubectl apply -f secrets/ || true; fi
          if [ -f "rabbitmq/cluster-operator.yaml" ]; then
            echo "⚡ Deploying RabbitMQ Cluster Operator..."
            kubectl apply -f rabbitmq/cluster-operator.yaml || true
            sleep 10
          fi
          if [ -f "rabbitmq/rabbitmq-cluster.yaml" ]; then kubectl apply -f rabbitmq/rabbitmq-cluster.yaml || true; fi
          if [ -d "infra" ]; then kubectl apply -f infra/ || true; fi
          if [ -d "apps" ]; then kubectl apply -f apps/ || true; fi
          if [ -d "ingress" ]; then kubectl apply -f ingress/ || true; fi
          if [ -d "logging" ]; then kubectl apply -f logging/ || true; fi

      - name: 🔔 Send Discord Notification
        if: always()
        run: |
          if [ -z "${{ secrets.DISCORD_WEBHOOK }}" ]; then
            echo "⚠️ DISCORD_WEBHOOK secret not found. Skipping notification."
            exit 0
          fi

          if [ "${{ job.status }}" = "success" ]; then
            COLOR=3066993
            TITLE="🚀 K8s Infrastructure & Configs Deploy Successful!"
          else
            COLOR=15158332
            TITLE="❌ K8s Infrastructure & Configs Deploy Failed!"
          fi

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"Repository\", \"value\": \"${{ github.repository }}\", \"inline\": true},
                  {\"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                  {\"name\": \"Author\", \"value\": \"${{ github.actor }}\", \"inline\": true},
                  {\"name\": \"Commit\", \"value\": \"${{ github.event.head_commit.message }}\"}
                ],
                \"footer\": {\"text\": \"InkPulse CI/CD Bot\"}
              }]
            }" ${{ secrets.DISCORD_WEBHOOK }}
