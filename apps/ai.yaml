apiVersion: v1
kind: Service
metadata:
  name: ai-service
spec:
  selector:
    app: ai-core
  ports:
  - port: 80
    targetPort: 8000
    name: http
  - port: 50051
    targetPort: 50051
    name: grpc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-deployment
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ai-core
  template:
    metadata:
      labels:
        app: ai-core
    spec:
      containers:
      - name: app
        image: ghcr.io/zhengzhongxian/inkpulse-ai:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 50051
          name: grpc
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: enterprise-secrets
              key: postgres-password
        - name: DB_URL
          value: "postgresql+asyncpg://postgres:$(DB_PASSWORD)@postgres-0.postgres-headless.default.svc.cluster.local:5432/enterprise_db"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: enterprise-secrets
              key: redis-password
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1536Mi"
            cpu: "1500m"
        startupProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 24
        readinessProbe:
          tcpSocket:
            port: 8000
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 8000
          periodSeconds: 15
          failureThreshold: 3
        volumeMounts:
        - name: config-volume
          mountPath: /app/config/config.yaml
          subPath: config.yaml
      volumes:
      - name: config-volume
        configMap:
          name: ai-config
