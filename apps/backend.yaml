apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend-core
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-core
  template:
    metadata:
      labels:
        app: backend-core
    spec:
      containers:
      - name: app
        image: ghcr.io/zhengzhongxian/inkpulse-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: RABBITMQ_USERNAME
          valueFrom:
            secretKeyRef:
              name: rabbitmq-service-default-user
              key: username
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rabbitmq-service-default-user
              key: password
        - name: DB_PRIMARY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: enterprise-secrets
              key: postgres-password
        - name: DB_REPLICA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: enterprise-secrets
              key: postgres-password
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: enterprise-secrets
              key: redis-password
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: enterprise-secrets
              key: minio-root-password
        volumeMounts:
        - name: config-volume
          mountPath: /app/config/application.yml
          subPath: application.yml
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
      volumes:
      - name: config-volume
        configMap:
          name: inkpulse-config
