apiVersion: v1
kind: Service
metadata:
  name: redis-headless
spec:
  clusterIP: None
  selector:
    app: redis
  ports:
  - port: 6379
    name: redis
---
apiVersion: v1
kind: Service
metadata:
  name: redis-external
spec:
  type: NodePort
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
    nodePort: 30379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
spec:
  serviceName: redis-headless
  replicas: 2
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis/redis-stack-server:latest
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: enterprise-secrets
              key: redis-password
        command:
        - bash
        - -c
        - |
          POD_INDEX=${HOSTNAME##*-}
          if [ "$POD_INDEX" -eq "0" ]; then
            echo "Redis Stack Master (redis-0) with RediSearch + RedisJSON"
            redis-server \
              --loadmodule /opt/redis-stack/lib/redisearch.so \
              --loadmodule /opt/redis-stack/lib/rejson.so \
              --protected-mode no \
              --requirepass "$REDIS_PASSWORD"
          else
            echo "Redis Stack Replica (redis-$POD_INDEX)"
            redis-server \
              --loadmodule /opt/redis-stack/lib/redisearch.so \
              --loadmodule /opt/redis-stack/lib/rejson.so \
              --protected-mode no \
              --requirepass "$REDIS_PASSWORD" \
              --replicaof redis-0.redis-headless 6379 \
              --masterauth "$REDIS_PASSWORD"
          fi
        ports:
        - containerPort: 6379
          name: redis
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: redis-data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 2Gi
